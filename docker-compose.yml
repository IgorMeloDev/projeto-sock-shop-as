version: '3.8'

services:
  # ==========================================
  # BLOCO 1: A Loja (Microsserviços base do Sock Shop)
  # ==========================================
  front-end:
    image: weaveworksdemos/front-end:0.3.12
    hostname: front-end
    restart: always

  edge-router:
    image: weaveworksdemos/edge-router:0.1.1
    ports:
      - '8081:80' # Porta alterada para 8081 para evitar conflitos no seu Windows
    depends_on:
      - front-end
      - catalogue
      - orders
      - carts
      - user

  catalogue:
    image: weaveworksdemos/catalogue:0.3.5
    hostname: catalogue
    depends_on:
      - catalogue-db

  catalogue-db:
    image: weaveworksdemos/catalogue-db:0.3.0
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_ALLOW_EMPTY_PASSWORD=true
      - MYSQL_DATABASE=socksdb

  carts:
    image: weaveworksdemos/carts:0.4.8
    hostname: carts
    depends_on:
      - carts-db

  carts-db:
    image: mongo:4.2

  orders:
    image: weaveworksdemos/orders:0.4.7
    hostname: orders
    depends_on:
      - orders-db

  orders-db:
    image: mongo:4.2

  payment:
    image: weaveworksdemos/payment:0.4.3
    hostname: payment

  shipping:
    image: weaveworksdemos/shipping:0.4.8
    hostname: shipping

  queue-master:
    image: weaveworksdemos/queue-master:0.3.1
    hostname: queue-master
    depends_on:
      - rabbitmq

  rabbitmq:
    image: rabbitmq:3.6.8-management

  user:
    image: weaveworksdemos/user:0.4.4
    hostname: user
    depends_on:
      - user-db

  user-db:
    image: weaveworksdemos/user-db:0.3.0
    # ==========================================
  # BLOCO 2: Monitoramento (Exercício 2)
  # ==========================================
  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    depends_on:
      - front-end

  grafana:
    image: grafana/grafana:11.1.4
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: cadvisor
    ports:
      - "8082:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    depends_on:
      - redis
      
  redis:
    image: redis:latest  
    # ==========================================
  # BLOCO 3: Logging Centralizado (Exercícios 1 e 3)
  # ==========================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m # Limitando a RAM para seu PC não travar
    ports:
      - "9200:9200"

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.3
    volumes:
      - ./logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    ports:
      - "5044:5044"
    depends_on:
      - elasticsearch

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.15.3
    user: root
    command: ["--strict.perms=false"]
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - logstash

volumes:
  grafana_data:
      